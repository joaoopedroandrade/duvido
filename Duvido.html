<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Blefe!</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0ede8;
    --muted: #7a7672;
    --accent: #e8c547;
    --accent-dim: #3a3010;
    --accent-text: #0f0f0f;
    --success: #4ade80;
    --success-dim: #0f2e1a;
    --danger: #f87171;
    --danger-dim: #2e1010;
    --info: #60a5fa;
    --info-dim: #0f1e2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.5; overflow-x: hidden; }

  .screen { display: none; min-height: 100dvh; padding: 1.5rem 1.25rem 2rem; flex-direction: column; gap: 0; }
  .screen.active { display: flex; }

  h1 { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; letter-spacing: -1px; color: var(--accent); line-height: 1; }
  h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); }
  h3 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; text-transform: uppercase; }
  p { color: var(--muted); font-size: 14px; line-height: 1.6; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    margin-bottom: 0.75rem;
  }

  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    margin-bottom: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, input[type="number"]:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
    transition: transform 0.1s, background 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-accent { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
  .btn-accent:hover { background: #f0d060; }
  .btn-success { background: var(--success-dim); color: var(--success); border-color: var(--success); }
  .btn-danger { background: var(--danger-dim); color: var(--danger); border-color: var(--danger); }
  .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }

  .score-row { display: flex; gap: 10px; margin-bottom: 1rem; }
  .score-box { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1rem; text-align: center; }
  .score-num { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; color: var(--accent); line-height: 1; }
  .score-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .score-box.leading { border-color: var(--accent); }

  .cat-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text); }
  .cat-item:last-child { border-bottom: none; }
  .cat-remove { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px; padding: 0 4px; margin-left: auto; line-height: 1; }

  .add-cat-row { display: flex; gap: 8px; margin-top: 10px; }
  .add-cat-row input { margin: 0; flex: 1; }
  .add-cat-btn { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); border-radius: 10px; padding: 0 18px; font-size: 20px; cursor: pointer; }

  .big-text { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; text-align: center; color: var(--text); background: var(--surface2); border-radius: 14px; padding: 1.5rem 1rem; margin: 0.75rem 0; line-height: 1.2; }
  .bid-num { font-family: 'Syne', sans-serif; font-size: 72px; font-weight: 800; text-align: center; color: var(--accent); line-height: 1; margin: 0.5rem 0; }
  .sub-label { font-size: 13px; text-align: center; color: var(--muted); }
  .turn-label { font-size: 15px; text-align: center; color: var(--text); font-weight: 500; margin-bottom: 0.25rem; }

  .timer-num { font-family: 'Syne', sans-serif; font-size: 80px; font-weight: 800; text-align: center; color: var(--accent); line-height: 1; margin: 1rem 0; }
  .timer-num.urgent { color: var(--danger); animation: pulse 0.5s infinite; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.5 } }

  .progress-track { background: var(--surface2); height: 6px; border-radius: 3px; overflow: hidden; margin-top: 0.5rem; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 1s linear; }

  .badge { display: inline-block; font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif; text-transform: uppercase; letter-spacing: 1px; padding: 4px 10px; border-radius: 6px; margin-bottom: 0.75rem; background: var(--accent-dim); color: var(--accent); }

  .spacer { flex: 1; }
  .mt1 { margin-top: 0.75rem; }
  .mb1 { margin-bottom: 0.75rem; }

  .trophy { font-size: 64px; text-align: center; margin: 1rem 0; }
  .winner-name { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; text-align: center; color: var(--accent); line-height: 1.1; margin-bottom: 0.5rem; }
  .winner-sub { text-align: center; font-size: 15px; color: var(--muted); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 0.75rem 0; }

  .section-gap { height: 0.75rem; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="s-setup" class="screen active">
  <h1 style="margin-bottom:0.25rem">Blefe!</h1>
  <p style="margin-bottom:1.5rem">Configure o jogo e escolha as categorias.</p>

  <div class="card">
    <h3 style="margin-bottom:0.75rem">Dupla X</h3>
    <input type="text" id="px-a" placeholder="Nome do Jogador A" />
    <input type="text" id="px-b" placeholder="Nome do Jogador B" style="margin-bottom:0" />
  </div>

  <div class="card">
    <h3 style="margin-bottom:0.75rem">Dupla Y</h3>
    <input type="text" id="py-c" placeholder="Nome do Jogador C" />
    <input type="text" id="py-d" placeholder="Nome do Jogador D" style="margin-bottom:0" />
  </div>

  <div class="card">
    <h3 style="margin-bottom:0.75rem">Categorias</h3>
    <div id="cat-list"></div>
    <div class="add-cat-row">
      <input type="text" id="cat-input" placeholder="Adicionar categoria..." />
      <button class="add-cat-btn" onclick="addCat()">+</button>
    </div>
  </div>

  <div class="spacer"></div>
  <button class="btn btn-accent" onclick="startGame()">Iniciar jogo →</button>
</div>

<!-- ROUND START -->
<div id="s-roundstart" class="screen">
  <div class="score-row" id="rs-scores"></div>
  <div class="card">
    <div class="badge" id="rs-badge">Rodada 1</div>
    <h2 id="rs-title" style="margin-bottom:0.5rem"></h2>
    <p id="rs-desc"></p>
  </div>
  <div class="spacer"></div>
  <button class="btn btn-accent" onclick="showCategory()">Ver categoria →</button>
</div>

<!-- CATEGORY REVEAL -->
<div id="s-category" class="screen">
  <div class="card" style="flex:1;display:flex;flex-direction:column;justify-content:center">
    <div class="badge" id="cat-badge">Rodada 1</div>
    <h2 style="margin-bottom:0.5rem">Categoria desta rodada:</h2>
    <div class="big-text" id="cat-display"></div>
    <p style="margin-top:0.75rem;font-size:13px">Apenas os jogadores indicados estão vendo. Memorizem!</p>
  </div>
  <button class="btn btn-accent" onclick="startBidding()">Começar lances →</button>
</div>

<!-- BIDDING -->
<div id="s-bidding" class="screen">
  <div class="score-row" id="bid-scores"></div>
  <div class="card" style="text-align:center">
    <p style="font-size:12px;margin-bottom:0.25rem" id="bid-cat-label"></p>
    <div class="turn-label" id="bid-turn"></div>
    <div class="bid-num" id="bid-num">—</div>
    <div class="sub-label" id="bid-sub"></div>
  </div>
  <div class="spacer"></div>
  <button class="btn btn-accent" id="btn-raise" onclick="goRaise()">Fazer lance →</button>
  <button class="btn btn-danger" id="btn-doubt" onclick="doubt()" style="display:none">Duvidar!</button>
</div>

<!-- RAISE INPUT -->
<div id="s-raise" class="screen">
  <div class="card">
    <h2 id="raise-title" style="margin-bottom:0.5rem"></h2>
    <p id="raise-desc" style="margin-bottom:1rem"></p>
    <input type="number" id="raise-input" placeholder="Número" min="1" style="font-size:24px;text-align:center;font-family:'Syne',sans-serif;font-weight:700" />
    <p id="raise-err" style="color:var(--danger);font-size:13px;display:none">O lance deve ser maior que o atual!</p>
  </div>
  <div class="spacer"></div>
  <button class="btn btn-accent" onclick="confirmRaise()">Confirmar →</button>
  <button class="btn btn-ghost" onclick="show('s-bidding')">Voltar</button>
</div>

<!-- CHALLENGE -->
<div id="s-challenge" class="screen">
  <div class="card" style="flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center">
    <div class="badge">Desafio!</div>
    <h2 id="chal-title" style="margin-bottom:0.5rem"></h2>
    <p id="chal-desc" style="margin-bottom:0.5rem"></p>
    <div class="big-text" id="chal-cat"></div>
    <div class="bid-num" id="chal-num"></div>
    <div class="sub-label">itens em 60 segundos</div>
  </div>
  <button class="btn btn-accent" onclick="startTimer()">Iniciar cronômetro →</button>
</div>

<!-- TIMER -->
<div id="s-timer" class="screen">
  <div class="card" style="flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center">
    <h3 id="timer-player" style="margin-bottom:0.5rem"></h3>
    <div class="big-text" id="timer-cat" style="font-size:20px;padding:1rem"></div>
    <p id="timer-goal" style="margin:0.5rem 0"></p>
    <div class="timer-num" id="timer-num">60</div>
    <div class="progress-track"><div class="progress-fill" id="timer-bar"></div></div>
  </div>
  <button class="btn btn-success" onclick="timerResult(true)">Conseguiu! ✓</button>
  <button class="btn btn-danger" onclick="timerResult(false)">Não conseguiu ✗</button>
</div>

<!-- RESULT -->
<div id="s-result" class="screen">
  <div class="score-row" id="res-scores"></div>
  <div class="card" style="flex:1;display:flex;flex-direction:column;justify-content:center">
    <h2 id="res-title" style="margin-bottom:0.75rem"></h2>
    <p id="res-desc"></p>
  </div>
  <button class="btn btn-accent" onclick="nextRound()">Próxima rodada →</button>
</div>

<!-- WINNER -->
<div id="s-winner" class="screen">
  <div class="score-row" id="win-scores"></div>
  <div class="card" style="flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center">
    <div class="trophy">🏆</div>
    <div class="winner-name" id="win-name"></div>
    <div class="winner-sub" id="win-sub"></div>
  </div>
  <button class="btn btn-accent" onclick="resetGame()">Jogar novamente →</button>
</div>

<script>
let G = {
  p: {a:'',b:'',c:'',d:''},
  cats: [
    "Cidades do estado de São Paulo",
    "Países da América do Sul",
    "Capitais europeias",
    "Frutas tropicais",
    "Times do Brasileirão",
    "Marcas de carro",
    "Músicos brasileiros famosos",
    "Personagens da Marvel",
    "Animais selvagens africanos",
    "Esportes olímpicos",
    "Profissões da área da saúde",
    "Ingredientes de pizza",
    "Países que fazem fronteira com o Brasil",
    "Presidentes do Brasil",
    "Instrumentos musicais",
    "Capitais dos estados brasileiros",
    "Doenças contagiosas",
    "Séries da Netflix",
    "Atores brasileiros",
    "Tipos de massa italiana",
    "Constelações famosas",
    "Cores de tinta",
    "Signos do zodíaco",
    "Tipos de cachorro",
    "Filmes da Disney",
    "Supervilões de quadrinhos",
    "Pontos turísticos do Brasil",
    "Jogadores da Seleção Brasileira",
    "Países da África",
    "Bebidas alcoólicas",
  ],
  scores: {x:0,y:0},
  round: 0,
  cat: '',
  bid: 0,
  turn: 'x',
  challenged: {dupla:'',player:''},
  timerInterval: null,
  timerLeft: 60,
  usedCats: []
};

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function addCat() {
  const inp = document.getElementById('cat-input');
  const v = inp.value.trim();
  if (!v) return;
  G.cats.push(v);
  inp.value = '';
  renderCats();
}
document.getElementById('cat-input').addEventListener('keydown', e => { if(e.key==='Enter') addCat(); });

function removeCat(i) { G.cats.splice(i,1); renderCats(); }

function renderCats() {
  document.getElementById('cat-list').innerHTML = G.cats.length === 0
    ? '<p style="font-size:13px;padding:0.5rem 0">Nenhuma categoria adicionada ainda.</p>'
    : G.cats.map((c,i) =>
        `<div class="cat-item"><span>${c}</span><button class="cat-remove" onclick="removeCat(${i})">×</button></div>`
      ).join('');
}
renderCats();

function startGame() {
  G.p.a = document.getElementById('px-a').value.trim() || 'Jogador A';
  G.p.b = document.getElementById('px-b').value.trim() || 'Jogador B';
  G.p.c = document.getElementById('py-c').value.trim() || 'Jogador C';
  G.p.d = document.getElementById('py-d').value.trim() || 'Jogador D';
  if (G.cats.length === 0) { alert('Adicione pelo menos uma categoria!'); return; }
  G.scores = {x:0,y:0};
  G.round = 0;
  G.usedCats = [];
  nextRound();
}

function xName() { return `${G.p.a} & ${G.p.b}`; }
function yName() { return `${G.p.c} & ${G.p.d}`; }

function buildScoreRow(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const lx = G.scores.x > G.scores.y;
  const ly = G.scores.y > G.scores.x;
  el.innerHTML = `
    <div class="score-box${lx?' leading':''}">
      <div class="score-num">${G.scores.x}</div>
      <div class="score-lbl">Dupla X<br>${G.p.a} & ${G.p.b}</div>
    </div>
    <div class="score-box${ly?' leading':''}">
      <div class="score-num">${G.scores.y}</div>
      <div class="score-lbl">Dupla Y<br>${G.p.c} & ${G.p.d}</div>
    </div>`;
}

function nextRound() {
  G.round++;
  const avail = G.cats.filter(c => !G.usedCats.includes(c));
  const pool = avail.length > 0 ? avail : G.cats;
  if (avail.length === 0) G.usedCats = [];
  G.cat = pool[Math.floor(Math.random()*pool.length)];
  G.usedCats.push(G.cat);
  G.bid = 0;
  G.turn = G.round % 2 === 1 ? 'x' : 'y';
  buildScoreRow('rs-scores');
  document.getElementById('rs-badge').textContent = `Rodada ${G.round}`;
  document.getElementById('rs-title').textContent = `Rodada ${G.round}`;
  document.getElementById('rs-desc').textContent =
    `Passe o celular para ${G.p.a} (Dupla X) e ${G.p.c} (Dupla Y). Os parceiros ${G.p.b} e ${G.p.d} não podem olhar!`;
  show('s-roundstart');
}

function showCategory() {
  document.getElementById('cat-badge').textContent = `Rodada ${G.round}`;
  document.getElementById('cat-display').textContent = G.cat;
  show('s-category');
}

function startBidding() {
  buildScoreRow('bid-scores');
  updateBidUI();
  show('s-bidding');
}

function updateBidUI() {
  buildScoreRow('bid-scores');
  const isX = G.turn === 'x';
  const bidder = isX ? G.p.a : G.p.c;
  const target = isX ? G.p.b : G.p.d;
  document.getElementById('bid-cat-label').textContent = `Categoria: ${G.cat}`;
  document.getElementById('bid-turn').textContent = `Vez de ${bidder}`;
  document.getElementById('bid-num').textContent = G.bid === 0 ? '—' : G.bid;
  document.getElementById('bid-sub').textContent = G.bid === 0
    ? 'Nenhum lance ainda'
    : `${target} precisa conseguir ${G.bid} itens`;
  const canDoubt = G.bid > 0;
  document.getElementById('btn-doubt').style.display = canDoubt ? 'block' : 'none';
  document.getElementById('btn-raise').textContent = G.bid === 0 ? 'Fazer lance →' : 'Aumentar o lance →';
}

function goRaise() {
  const isX = G.turn === 'x';
  const bidder = isX ? G.p.a : G.p.c;
  const target = isX ? G.p.b : G.p.d;
  document.getElementById('raise-title').textContent = `Lance de ${bidder}`;
  document.getElementById('raise-desc').textContent = G.bid === 0
    ? `Quantos itens de "${G.cat}" ${target} consegue falar?`
    : `Lance atual: ${G.bid}. Qual é o novo lance?`;
  document.getElementById('raise-input').value = '';
  document.getElementById('raise-err').style.display = 'none';
  show('s-raise');
}

function confirmRaise() {
  const val = parseInt(document.getElementById('raise-input').value);
  if (isNaN(val) || val <= G.bid) { document.getElementById('raise-err').style.display = 'block'; return; }
  G.bid = val;
  G.turn = G.turn === 'x' ? 'y' : 'x';
  updateBidUI();
  show('s-bidding');
}

function doubt() {
  const doubter = G.turn === 'x' ? G.p.a : G.p.c;
  const chalDupla = G.turn === 'x' ? 'y' : 'x';
  const chalPlayer = chalDupla === 'x' ? G.p.b : G.p.d;
  G.challenged = { dupla: chalDupla, player: chalPlayer };
  document.getElementById('chal-title').textContent = `${doubter} duvidou!`;
  document.getElementById('chal-desc').textContent = `${chalPlayer}, é hora de provar. Você tem 60 segundos:`;
  document.getElementById('chal-cat').textContent = G.cat;
  document.getElementById('chal-num').textContent = G.bid;
  show('s-challenge');
}

function startTimer() {
  document.getElementById('timer-player').textContent = `${G.challenged.player}, GO!`;
  document.getElementById('timer-cat').textContent = G.cat;
  document.getElementById('timer-goal').textContent = `Diga ${G.bid} itens desta categoria`;
  G.timerLeft = 60;
  document.getElementById('timer-num').textContent = '60';
  document.getElementById('timer-num').classList.remove('urgent');
  document.getElementById('timer-bar').style.width = '100%';
  show('s-timer');
  clearInterval(G.timerInterval);
  G.timerInterval = setInterval(() => {
    G.timerLeft--;
    const el = document.getElementById('timer-num');
    el.textContent = G.timerLeft;
    document.getElementById('timer-bar').style.width = (G.timerLeft/60*100)+'%';
    if (G.timerLeft <= 10) el.classList.add('urgent');
    if (G.timerLeft <= 0) { clearInterval(G.timerInterval); }
  }, 1000);
}

function timerResult(success) {
  clearInterval(G.timerInterval);
  const winner = success ? G.challenged.dupla : (G.challenged.dupla === 'x' ? 'y' : 'x');
  G.scores[winner]++;
  buildScoreRow('res-scores');
  const wName = winner === 'x' ? `Dupla X (${xName()})` : `Dupla Y (${yName()})`;
  if (G.scores[winner] >= 5) {
    buildScoreRow('win-scores');
    document.getElementById('win-name').textContent = winner === 'x' ? 'Dupla X venceu!' : 'Dupla Y venceu!';
    document.getElementById('win-sub').textContent = winner === 'x' ? `${G.p.a} e ${G.p.b} são os campeões!` : `${G.p.c} e ${G.p.d} são os campeões!`;
    show('s-winner');
    return;
  }
  document.getElementById('res-title').textContent = `Ponto para ${wName}!`;
  document.getElementById('res-desc').textContent = success
    ? `${G.challenged.player} conseguiu falar ${G.bid} itens de "${G.cat}"!`
    : `${G.challenged.player} não conseguiu falar ${G.bid} itens de "${G.cat}".`;
  show('s-result');
}

function resetGame() {
  G.scores = {x:0,y:0};
  G.round = 0;
  G.usedCats = [];
  show('s-setup');
}
</script>
</body>
</html>
